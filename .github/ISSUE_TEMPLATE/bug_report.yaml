name: Bug Report
description: Create a report to help me fix a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much info as possible.
  - type: input
    id: version
    attributes:
      label: Minecraft Version
      description: What version of Minecraft are you playing on?
      placeholder: e.g., 1.20.1
    validations:
      required: true
  - type: dropdown
    id: loader
    attributes:
      label: Mod Loader
      options:
        - Fabric
        - Forge
        - NeoForge
    validations:
      required: true
  - type: input
    id: chimage_version
    attributes:
      label: Chimage Version
      description: Which version of the mod are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what actually happened and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can I trigger this bug myself?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: input
    id: logs
    attributes:
      label: Logs / Crash Reports
      description: If you have a crash report or log, please upload it to Pastebin or mclo.gs and paste the link here.
